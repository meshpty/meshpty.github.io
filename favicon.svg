<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#14181c"/>
  <!-- enlaces de la malla -->
  <g stroke="#5a6167" stroke-width="2" stroke-linecap="round">
    <line x1="32" y1="32" x2="14" y2="16"/>
    <line x1="32" y1="32" x2="50" y2="16"/>
    <line x1="32" y1="32" x2="14" y2="48"/>
    <line x1="32" y1="32" x2="50" y2="48"/>
    <line x1="14" y1="16" x2="50" y2="16"/>
    <line x1="14" y1="48" x2="50" y2="48"/>
  </g>
  <!-- nodos -->
  <g fill="#c9ced3">
    <circle cx="14" cy="16" r="5"/>
    <circle cx="50" cy="16" r="5"/>
    <circle cx="14" cy="48" r="5"/>
